<div class="min-h-screen bg-[#0a0a0a]">
  @if (!isPublicRoute()) {
    <!-- Botón hamburguesa para mobile -->
    <button
      (click)="sidebar.toggle()"
      class="fixed top-4 left-4 z-50 lg:hidden bg-[#101012] text-white p-2 rounded-lg border border-gray-700 hover:bg-gray-800 transition-colors cursor-pointer"
      aria-label="Abrir menú"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <app-sidebar #sidebar />
  }

  <main [class]="isPublicRoute() ? 'flex-1' : 'flex-1 lg:ml-64 pt-16 lg:pt-20'">
    <router-outlet />
  </main>
</div>
