@let materialList = materials();
<div class="w-full min-h-screen bg-gray-100 pt-6 pb-8 px-4 sm:px-6">
  <h1 class="text-left text-2xl sm:text-3xl text-gray-800 font-bold max-w-4xl mx-auto">
    Materiales Disponibles
  </h1>
  <div
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 max-w-4xl mx-auto mt-6 sm:mt-8 w-full"
  >
    @for (material of materialList.values(); track material._id) {
      <div class="bg-white shadow-md text-start rounded-sm min-w-0">
        <div class="bg-gray-300 h-24 sm:h-28 md:h-32 flex items-center justify-center rounded-t-sm">
          <p>IMAGE</p>
        </div>
        <div class="p-4">
          <h3 class="text-xl sm:text-2xl font-semibold wrap-break-word">{{ material.type }}</h3>
          <p class="text-lg sm:text-xl wrap-break-word">{{ material.brand }}</p>
          <p>{{ material.weight }}g</p>
          <p>{{ material.price | currency: 'ARS' : 'symbol' : '1.0-2' }}</p>
        </div>
      </div>
    } @empty {
      No se encontraron materiales
    }
  </div>
</div>
