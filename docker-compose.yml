services:
  # 1. BASE DE DATOS
  mongodb:
    image: mongo:latest
    container_name: 3d-mongo-prod
    restart: always
    # ports:
    #   - "27017:27017" # Protegida en la red interna
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  # 2. BACKEND (API en Bun)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 3d-api-prod
    restart: always
    # ports:
    #   - "4000:4000" # <-- COMENTADO: Ahora está protegida, Nginx habla con ella internamente
    environment:
      - NODE_ENV=prod
      - DB_URL=mongodb://mongodb:27017/3d-dashboard
    depends_on:
      - mongodb
    networks:
      - app_network

  # 3. FRONTEND (Tu App en Angular + Nginx)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 3d-web-prod
    restart: always
    ports:
      - "80:80" # HTTP estándar (redirige a HTTPS)
      - "443:443" # HTTPS seguro
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro # <-- CORREGIDO: Con la 'n' bien puesta
    depends_on:
      - api
    networks:
      - app_network

# Definimos el disco duro virtual para que los materiales y cotizaciones sobrevivan
volumes:
  mongo_data:

# Definimos una red privada para que los contenedores hablen entre sí de forma segura
networks:
  app_network:
    driver: bridge
